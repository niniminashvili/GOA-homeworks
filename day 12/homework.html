<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <label for="fullname">სრული სახელი:</label><br>
    <input type="text" id="fullname" name="fullname" placeholder="შეიყვანეთ სახელი" required><br><br>

    <label for="email">ემაილი:</label><br>
    <input type="text" id="email" name="email" placeholder="შეიყვანეთ ემაილი" required><br><br>

    <label for="password">პაროლი:</label><br>
    <input type="text" id="password" name="password" placeholder="შეიყვანეთ პაროლი" required><br><br>

    <label for="date of birth">დაბადების თარიღი:</label><br>
    <input type="text" id="date of birth" name="date of birth" placeholder="შეიყვანეთ დაბადების თარიღი" required><br><br>

    <label for="contact number">საკონტაქტო ნომერი:</label><br>
    <input type="text" id="contact number" name="contact number" placeholder="შეიყვანეთ საკონტაქტო ნომერი" required><br><br>
    
    <label for="city">ქალაქი:</label><br>
    <input type="text" id="city" name="city" placeholder="შეიყვანეთ ქალაქი" required><br><br>




</body>
</html>
